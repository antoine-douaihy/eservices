[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.bcmath", "php82Extensions.imagick", "composer_2", "nodejs_20", "nodePackages.npm"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd --ignore-platform-req=ext-imagick",
    "npm ci",
    "npm run build",
    "php artisan config:cache"
]

[start]
cmd = "php artisan migrate --force && frankenphp run --config /Caddyfile"
